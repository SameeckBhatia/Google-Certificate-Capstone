<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box
        }

        body {
            font-family: Bahnschrift, sans-serif;
            margin: 0;
            background-color: rgb(12, 12, 12);
        }

        .mySlides {
            display: none;
            vertical-align: center;
        }

        img {
            vertical-align: middle;
        }

        /* Slideshow container */
        .slideshow-container {
            max-width: 70%;
            position: relative;
            margin: auto;
            top: 32px;
        }

        /* Next & previous buttons */
        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
        }

        /* Position the "next button" to the right */
        .next {
            right: -50px;
            border-radius: 3px 0 0 3px;
        }

        .prev{
            left: -50px;
        }

        /* Number text (1/3 etc) */
        .numbertext {
            color: #f2f2f2;
            font-size: 14px;
            padding: 12px 12px;
            position: absolute;
            top: 0;
            right: 10px;
        }

        /* On smaller screens, decrease text size */
        @media only screen and (max-width: 300px) {

            .prev,
            .next,
            .text {
                font-size: 9px
            }
        }
    </style>
</head>

<body>

    <div class="slideshow-container">

        <div class="mySlides fade">
            <div class="numbertext">1 / 10</div>
            <img src="Slides/Slide1.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">2 / 10</div>
            <img src="Slides/Slide2.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">3 / 10</div>
            <img src="Slides/Slide3.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">4 / 10</div>
            <img src="Slides/Slide4.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">5 / 10</div>
            <img src="Slides/Slide5.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">6 / 10</div>
            <img src="Slides/Slide6.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">7 / 10</div>
            <img src="Slides/Slide7.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">8 / 10</div>
            <img src="Slides/Slide8.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">9 / 10</div>
            <img src="Slides/Slide9.svg" style="width:100%">
        </div>

        <div class="mySlides fade">
            <div class="numbertext">10 / 10</div>
            <img src="Slides/Slide10.svg" style="width:100%">
        </div>

        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="next" onclick="plusSlides(1)">❯</a>

    </div>
    <br>

    <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            const nextSlideIndex = slideIndex + n;
            if (nextSlideIndex <= document.getElementsByClassName("mySlides").length && nextSlideIndex >= 1) {
                showSlides(nextSlideIndex);
            }
        }

        function currentSlide(n) {
            if (n <= document.getElementsByClassName("mySlides").length && n >= 1) {
                showSlides(n);
            }
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            if (n > slides.length) {
                slideIndex = slides.length;
            } else if (n < 1) {
                slideIndex = 1;
            } else {
                slideIndex = n;
            }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }
    </script>

</body>

</html>
